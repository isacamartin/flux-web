<!DOCTYPE html>

*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#fff;font-family:'SF Mono','Fira Code',monospace}
.bar{position:fixed;top:0;left:0;right:0;z-index:9999;background:#0a0a0a;border-bottom:1px solid #1a1a1a;padding:.4rem 1.5rem;display:flex;align-items:center;gap:1rem;height:2.5rem}

<!-- Mock API server (service worker simulation via fetch intercept) -->
<script>
// ── Mock API ──────────────────────────────────────────────────
const MOCK_DB = {
  users: [
    {id:1, name:'Alice Johnson',   email:'alice@example.com', plan:'pro',      status:'active', mrr:'$29'},
    {id:2, name:'Bob Smith',       email:'bob@example.com',   plan:'starter',  status:'active', mrr:'$0'},
    {id:3, name:'Carol Williams',  email:'carol@example.com', plan:'enterprise',status:'active',mrr:'$299'},
    {id:4, name:'Dave Brown',      email:'dave@example.com',  plan:'pro',      status:'churned',mrr:'$0'},
    {id:5, name:'Eve Davis',       email:'eve@example.com',   plan:'pro',      status:'active', mrr:'$29'},
  ],
  stats: { users: 1203, mrr: 24830, retention: '94.2%', uptime: '99.99%', arr: 297960 },
  session: null,
}

// Intercept fetch for /api/* routes
const _fetch = window.fetch
window.fetch = async (url, opts={}) => {
  if (!url.startsWith('/api/')) return _fetch(url, opts)
  
  await new Promise(r => setTimeout(r, 120 + Math.random()*80)) // realistic latency
  
  const method = (opts.method || 'GET').toUpperCase()
  const body = opts.body ? JSON.parse(opts.body) : {}
  const path = url.split('?')[0]

  // Stats
  if (path === '/api/stats') {
    // Simulate live updates
    MOCK_DB.stats.users += Math.floor(Math.random()*3)
    MOCK_DB.stats.mrr += Math.floor(Math.random()*50)
    return new Response(JSON.stringify(MOCK_DB.stats), {status:200, headers:{'Content-Type':'application/json'}})
  }

  // Users list
  if (path === '/api/users' && method === 'GET') {
    return new Response(JSON.stringify(MOCK_DB.users), {status:200, headers:{'Content-Type':'application/json'}})
  }

  // Create user
  if (path === '/api/users' && method === 'POST') {
    const user = { id: Date.now(), ...body, status: 'active', mrr: '$0' }
    MOCK_DB.users.push(user)
    return new Response(JSON.stringify(user), {status:201, headers:{'Content-Type':'application/json'}})
  }

  // Auth login
  if (path === '/api/auth/login' && method === 'POST') {
    if (body.email && body.password) {
      MOCK_DB.session = { id: 1, name: 'Admin User', email: body.email, role: 'admin' }
      return new Response(JSON.stringify(MOCK_DB.session), {status:200, headers:{'Content-Type':'application/json'}})
    }
    return new Response(JSON.stringify({error:'Invalid credentials'}), {status:401, headers:{'Content-Type':'application/json'}})
  }

  // Posts/feed
  if (path === '/api/posts' && method === 'GET') {
    return new Response(JSON.stringify([
      {id:1, title:'Introducing FLUX', body:'A new AI-first web language', date:'2025-01-15'},
      {id:2, title:'FLUX vs React', body:'Why machine languages win', date:'2025-01-10'},
      {id:3, title:'Building with AI', body:'The future of web development', date:'2025-01-05'},
    ]), {status:200, headers:{'Content-Type':'application/json'}})
  }

  return new Response(JSON.stringify({error:'Not found'}), {status:404, headers:{'Content-Type':'application/json'}})
}
</script>

<!-- FLUX Runtime -->
<script>
// ── Inline FLUX Runtime ───────────────────────────────────────────────
const ICONS={bolt:'⚡',leaf:'🌱',map:'🗺',chart:'📊',lock:'🔒',star:'⭐',heart:'❤',check:'✓',alert:'⚠',user:'👤',car:'🚗',money:'💰',phone:'📱',shield:'🛡',fire:'🔥',rocket:'🚀',clock:'🕐',globe:'🌐',gear:'⚙',pin:'📍',flash:'⚡',eye:'◉',tag:'◈',plus:'+',minus:'−',edit:'✎',trash:'🗑',search:'⌕',bell:'🔔',home:'⌂',mail:'✉'}

class State{constructor(){this._d={};this._c={};this._w={};this._ce={};this._batch=false;this._dirty=new Set()}
set(k,v){if(JSON.stringify(this._d[k])===JSON.stringify(v))return;this._d[k]=v;if(this._batch){this._dirty.add(k)}else{this._notify(k);this._recompute()}}
get(k){return this._d[k]}
eval(expr){if(!expr)return undefined;expr=expr.trim();if(expr.startsWith('@')){const p=expr.slice(1).split('.');let v=this._d[p[0]];for(let i=1;i<p.length;i++){if(v==null)return undefined;v=v[p[i]]}return v}if(expr.startsWith('$'))return this._c[expr.slice(1)];if(expr.includes('{@')||expr.includes('{$'))return expr.replace(/\{[@$][^}]+\}/g,m=>{const v=this.eval(m.slice(1,-1));return v==null?'':v});return expr}
resolve(str){if(!str)return'';if(!str.includes('@')&&!str.includes('$'))return str;return str.replace(/[@$][a-zA-Z_][a-zA-Z0-9_.]*/g,m=>{const v=this.eval(m);return v==null?'':String(v)})}
defineComputed(name,expr){this._c[name]=null;this._ce[name]=expr;this._recompute()}
_recompute(){for(const[n,expr]of Object.entries(this._ce)){try{const fn=new Function(...Object.keys(this._d).map(k=>'_'+k),`try{return(${expr})}catch(e){return null}`);const v=fn(...Object.keys(this._d).map(k=>this._d[k]));if(JSON.stringify(this._c[n])!==JSON.stringify(v)){this._c[n]=v;this._notify('$'+n)}}catch(e){}}}
watch(k,cb){if(!this._w[k])this._w[k]=new Set();this._w[k].add(cb);return()=>this._w[k].delete(cb)}
_notify(k){if(this._w[k])for(const cb of this._w[k])cb(this._d[k]);if(this._w['*'])for(const cb of this._w['*'])cb(k,this._d[k])}}

class QueryEngine{constructor(s){this.s=s;this.ivs=[]}
async run(q){const path=this.s.resolve(q.path);const opts={method:q.method,headers:{'Content-Type':'application/json'}};if(q.body)opts.body=JSON.stringify(q.body);try{const res=await fetch(path,opts);if(!res.ok)throw new Error('HTTP '+res.status);const data=await res.json();this._apply(data,q.target,q.action);return data}catch(e){console.warn('[FLUX]',q.method,path,e.message);return null}}
_apply(data,target,action){if(!target&&!action)return;if(action){if(action.startsWith('redirect ')){Router.push(action.slice(9).trim());return}if(action.startsWith('reload')){window.location.reload();return}const pm=action.match(/^@([a-zA-Z_]+)\.push\(\$result\)$/);if(pm){const arr=this.s.get(pm[1])||[];this.s.set(pm[1],[...arr,data]);return}const am=action.match(/^@([a-zA-Z_]+)\s*=\s*\$result$/);if(am){this.s.set(am[1],data);return}}if(target&&target.startsWith('@'))this.s.set(target.slice(1),data)}
mountAll(qs){for(const q of qs){if(q.trigger==='mount'){this.run(q)}else if(q.trigger==='interval'){this.run(q);const id=setInterval(()=>this.run(q),q.interval);this.ivs.push(id)}}}
destroy(){for(const id of this.ivs)clearInterval(id);this.ivs=[]}}

function parseFlux(src){return src.split(/^---$/m).map(s=>parsePage(s.trim())).filter(Boolean)}

function parsePage(src){
  const lines=src.split('\n').map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'))
  if(!lines.length)return null
  const page={id:'page',theme:'dark',route:'/',state:{},computed:{},queries:[],blocks:[]}
  for(const line of lines){
    if(line.startsWith('%')){const p=line.slice(1).trim().split(/\s+/);page.id=p[0]||'page';page.theme=p[1]||'dark';page.route=p[2]||'/';continue}
    if(line.startsWith('@')&&line.includes('=')){const eq=line.indexOf('=');const k=line.slice(1,eq).trim();const v=line.slice(eq+1).trim();try{page.state[k]=JSON.parse(v)}catch{page.state[k]=v};continue}
    if(line.startsWith('$')&&line.includes('=')){const eq=line.indexOf('=');page.computed[line.slice(1,eq).trim()]=line.slice(eq+1).trim();continue}
    if(line.startsWith('~')){const q=parseQuery(line.slice(1).trim());if(q)page.queries.push(q);continue}
    const tm=line.match(/^table\s+(@\S+)\s*\{(.*)/);if(tm){const c=tm[2].endsWith('}')?tm[2].slice(0,-1):tm[2];page.blocks.push({kind:'table',binding:tm[1],cols:parseCols(c),empty:parseEmpty(c)});continue}
    const lm=line.match(/^list\s+(@\S+)\s*\{(.*)/);if(lm){const c=lm[2].endsWith('}')?lm[2].slice(0,-1):lm[2];page.blocks.push({kind:'list',binding:lm[1],fields:parseCols(c)});continue}
    const fm=line.match(/^form\s+(GET|POST|PUT|PATCH|DELETE)\s+(\S+)(?:\s*=>\s*([^{]+))?\s*\{(.*)/);if(fm){const c=fm[4].endsWith('}')?fm[4].slice(0,-1):fm[4];page.blocks.push({kind:'form',method:fm[1],path:fm[2],action:(fm[3]||'').trim(),fields:parseFormFields(c)});continue}
    const im=line.match(/^if\s+(!?[@$][a-zA-Z_0-9.]+)\s*\{(.*)/);if(im){const c=im[2].endsWith('}')?im[2].slice(0,-1):im[2];page.blocks.push({kind:'if',condition:im[1],inner:c.trim()});continue}
    const bi=line.indexOf('{');if(bi!==-1){const head=line.slice(0,bi).trim();const body=line.slice(bi+1,line.lastIndexOf('}')).trim();const m=head.match(/^([a-z]+)(\d+)?$/);page.blocks.push({kind:m?m[1]:head,cols:m&&m[2]?parseInt(m[2]):3,items:parseItems(body)})}
  }
  return page
}

function parseQuery(s){const p=s.split(/\s+/);const ai=p.indexOf('=>');if(p[0]==='mount'){if(ai!==-1)return{trigger:'mount',method:p[1],path:p[2],target:null,action:p.slice(ai+1).join(' ').trim()};return{trigger:'mount',method:p[1],path:p[2],target:p[3],action:null}}
if(p[0]==='interval'){if(ai!==-1)return{trigger:'interval',interval:parseInt(p[1]),method:p[2],path:p[3],target:null,action:p.slice(ai+1).join(' ').trim()};return{trigger:'interval',interval:parseInt(p[1]),method:p[2],path:p[3],target:p[4],action:null}}return null}

function parseItems(body){return body.split('|').map(item=>item.trim().split('>').map(f=>{f=f.trim();if(f.startsWith('/')){const[p,l]=f.split(':');return{isLink:true,path:(p||'').trim(),label:(l||'').trim()}}return{isLink:false,text:f}})).filter(i=>i.length>0&&(i[0].text||i[0].isLink))}
function parseCols(s){return s.split('|').map(c=>{c=c.trim();if(c.startsWith('empty:'))return null;const[l,k]=c.split(':').map(x=>x.trim());return k?{label:l,key:k}:null}).filter(Boolean)}
function parseEmpty(s){const m=s.match(/empty:\s*([^|]+)/);return m?m[1].trim():'No data.'}
function parseFormFields(s){return s.split('|').map(f=>{const p=f.split(':').map(x=>x.trim());return{label:p[0],type:p[1]||'text',placeholder:p[2]||'',name:(p[0]||'').toLowerCase().replace(/\s+/g,'_')}}).filter(f=>f.label)}

class Renderer{
  constructor(state,container){this.state=state;this.container=container;this._cls=[]}
  t(s){return this.state.resolve(s)}
  el(tag,cls,html){const e=document.createElement(tag);if(cls)e.className=cls;if(html)e.innerHTML=html;return e}
  render(page){this.container.innerHTML='';this.container.className=`flux-root flux-theme-${page.theme}`;for(const b of page.blocks){const el=this.renderBlock(b);if(el)this.container.appendChild(el)}}
  renderBlock(b){switch(b.kind){case'nav':return this.rNav(b);case'hero':return this.rHero(b);case'stats':return this.rStats(b);case'row':return this.rRow(b);case'sect':return this.rSect(b);case'foot':return this.rFoot(b);case'table':return this.rTable(b);case'list':return this.rList(b);case'form':return this.rForm(b);case'if':return this.rIf(b);case'alert':return this.rAlert(b);default:return null}}
  rNav(b){const nav=this.el('nav','fx-nav');if(!b.items?.[0])return nav;const it=b.items[0];let ls=0;if(!it[0]?.isLink){const br=this.el('span','fx-brand');br.textContent=this.t(it[0].text);nav.appendChild(br);ls=1}const lnks=this.el('div','fx-nav-links');for(const f of it.slice(ls)){if(f.isLink){const a=this.el('a','fx-nav-link');a.href=f.path;a.textContent=f.label;a.addEventListener('click',e=>{e.preventDefault();Router.push(f.path)});lnks.appendChild(a)}}nav.appendChild(lnks);return nav}
  rHero(b){const sec=this.el('section','fx-hero');const inn=this.el('div','fx-hero-inner');sec.appendChild(inn);let h1=false;for(const it of b.items)for(const f of it){if(f.isLink){const a=this.el('a','fx-cta');a.href=f.path;a.textContent=f.label;a.addEventListener('click',e=>{e.preventDefault();Router.push(f.path)});inn.appendChild(a)}else if(!h1){const el=this.el('h1','fx-title');el.textContent=this.t(f.text);inn.appendChild(el);h1=true;if(f.text.includes('@')||f.text.includes('$')){const orig=f.text;const s=this.state.watch('*',()=>{el.textContent=this.t(orig)});this._cls.push(s)}}else{const el=this.el('p','fx-sub');el.textContent=this.t(f.text);inn.appendChild(el)}}return sec}
  rStats(b){const wrap=this.el('div','fx-stats');for(const it of b.items){const[val,lbl]=(it[0]?.text||'').split(':');const cell=this.el('div','fx-stat');const ve=this.el('div','fx-stat-val');const le=this.el('div','fx-stat-lbl');ve.textContent=this.t(val?.trim());le.textContent=this.t(lbl?.trim());cell.appendChild(ve);cell.appendChild(le);wrap.appendChild(cell);const raw=it[0]?.text||'';if(raw.includes('@')||raw.includes('$')){const ov=val?.trim(),ol=lbl?.trim();const s=this.state.watch('*',()=>{ve.textContent=this.t(ov);le.textContent=this.t(ol)});this._cls.push(s)}}return wrap}
  rRow(b){const g=this.el('div',`fx-grid fx-grid-${b.cols||3}`);for(const it of b.items){const c=this.el('div','fx-card');it.forEach((f,fi)=>{if(f.isLink){const a=this.el('a','fx-card-link');a.href=f.path;a.textContent=f.label+' →';a.addEventListener('click',e=>{e.preventDefault();Router.push(f.path)});c.appendChild(a)}else if(fi===0){const i=this.el('div','fx-icon');i.textContent=ICONS[f.text]||f.text;c.appendChild(i)}else if(fi===1){const h=this.el('h3','fx-card-title');h.textContent=this.t(f.text);c.appendChild(h)}else{const p=this.el('p','fx-card-body');p.textContent=this.t(f.text);c.appendChild(p)}});g.appendChild(c)}return g}
  rSect(b){const sec=this.el('section','fx-sect');b.items.forEach((it,ii)=>{for(const f of it){if(f.isLink){const a=this.el('a','fx-sect-link');a.href=f.path;a.textContent=f.label;a.addEventListener('click',e=>{e.preventDefault();Router.push(f.path)});sec.appendChild(a)}else if(ii===0){const h=this.el('h2','fx-sect-title');h.textContent=this.t(f.text);sec.appendChild(h)}else{const p=this.el('p','fx-sect-body');p.textContent=this.t(f.text);sec.appendChild(p)}}});return sec}
  rFoot(b){const ft=this.el('footer','fx-footer');for(const it of b.items)for(const f of it){if(f.isLink){const a=this.el('a','fx-footer-link');a.href=f.path;a.textContent=f.label;ft.appendChild(a)}else{const p=this.el('p','fx-footer-text');p.textContent=this.t(f.text);ft.appendChild(p)}}return ft}
  rTable(b){
    const wrap=this.el('div','fx-table-wrap');const tbl=document.createElement('table');tbl.className='fx-table';
    const thead=document.createElement('thead');const tr=document.createElement('tr');tr.className='fx-thead-row';
    for(const col of b.cols){const th=document.createElement('th');th.className='fx-th';th.textContent=col.label;tr.appendChild(th)}
    thead.appendChild(tr);tbl.appendChild(thead);const tbody=document.createElement('tbody');tbody.className='fx-tbody';tbl.appendChild(tbody);wrap.appendChild(tbl);
    const render=()=>{let rows=this.state.eval(b.binding);if(!Array.isArray(rows))rows=[];tbody.innerHTML='';
      if(!rows.length){const r=document.createElement('tr');const td=document.createElement('td');td.colSpan=b.cols.length;td.className='fx-td-empty';td.textContent=b.empty||'No data.';r.appendChild(td);tbody.appendChild(r);return}
      for(const row of rows){const r=document.createElement('tr');r.className='fx-tr';for(const col of b.cols){const td=document.createElement('td');td.className='fx-td';td.textContent=row[col.key]!=null?row[col.key]:'';r.appendChild(td)}tbody.appendChild(r)}};
    render();const key=b.binding.slice(1);const s=this.state.watch(key,render);this._cls.push(s);return wrap}
  rList(b){const wrap=this.el('div','fx-list-wrap');const render=()=>{let items=this.state.eval(b.binding);if(!Array.isArray(items))items=[];wrap.innerHTML='';for(const item of items){const c=this.el('div','fx-list-item');for(const f of b.fields){const p=this.el('p','fx-list-field');p.textContent=item[f.key]||'';c.appendChild(p)}wrap.appendChild(c)}};render();const s=this.state.watch(b.binding.slice(1),render);this._cls.push(s);return wrap}
  rForm(b){
    const wrap=this.el('div','fx-form-wrap');const form=document.createElement('form');form.className='fx-form';
    for(const f of b.fields){const fw=this.el('div','fx-field');const lbl=this.el('label','fx-label');lbl.textContent=f.label;fw.appendChild(lbl);if(f.type==='select'&&f.placeholder){const sel=document.createElement('select');sel.className='fx-input';sel.name=f.name;for(const o of f.placeholder.split(',')){const op=document.createElement('option');op.value=o.trim();op.textContent=o.trim();sel.appendChild(op)}fw.appendChild(sel)}else{const inp=document.createElement('input');inp.className='fx-input';inp.type=f.type;inp.name=f.name;inp.placeholder=f.placeholder;fw.appendChild(inp)}form.appendChild(fw)}
    const msg=this.el('div','fx-form-msg');form.appendChild(msg);
    const btn=document.createElement('button');btn.type='submit';btn.className='fx-btn';btn.textContent='Submit';form.appendChild(btn);
    const qe=new QueryEngine(this.state);
    form.addEventListener('submit',async e=>{e.preventDefault();btn.disabled=true;btn.textContent='Loading...';msg.textContent='';const data={};for(const i of form.querySelectorAll('input,select'))data[i.name]=i.value;const path=this.state.resolve(b.path);try{const res=await fetch(path,{method:b.method,headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});const result=await res.json();if(!res.ok){msg.className='fx-form-msg fx-form-err';msg.textContent=result.message||result.error||'Error.';btn.disabled=false;btn.textContent='Submit';return}if(b.action)qe._apply(result,null,b.action);msg.className='fx-form-msg fx-form-ok';msg.textContent='Done!'}catch(err){msg.className='fx-form-msg fx-form-err';msg.textContent='Network error.'}btn.disabled=false;btn.textContent='Submit'});
    wrap.appendChild(form);return wrap}

const Router={pages:[],container:null,_r:null,_q:null,
  init(pages,container){this.pages=pages;this.container=container;window.addEventListener('popstate',()=>this._go(location.pathname));this._go(location.pathname)},
  push(path){if(path===location.pathname)return;history.pushState({},''  ,path);this._go(path)},
  _go(path){
    let page=this.pages.find(p=>p.route===path)||this.pages.find(p=>path.startsWith(p.route)&&p.route!=='/')||this.pages.find(p=>p.route==='/');
    if(!page)return;
    if(this._r)this._r.destroy();if(this._q)this._q.destroy();
    const state=new State();
    for(const[k,v]of Object.entries(page.state||{}))state.set(k,v);
    for(const[k,expr]of Object.entries(page.computed||{}))state.defineComputed(k,expr.replace(/@([a-zA-Z_]+)/g,'_$1'));
    const renderer=new Renderer(state,this.container);renderer.render(page);this._r=renderer;
    const qe=new QueryEngine(state);qe.mountAll(page.queries);this._q=qe;
    document.title=page.id.charAt(0).toUpperCase()+page.id.slice(1);
    document.getElementById('bar-route').textContent='route: '+path;
  }
}

function boot(src, container) {
  if (!document.getElementById('flux-css')) {
    const s = document.createElement('style');s.id='flux-css';s.textContent=CSS;document.head.appendChild(s)
  }
  const pages = parseFlux(src)
  document.getElementById('s-pages').textContent = pages.length
  document.getElementById('s-state').textContent = pages.reduce((a,p)=>a+Object.keys(p.state).length,0)
  document.getElementById('s-queries').textContent = pages.reduce((a,p)=>a+p.queries.length,0)
  Router.init(pages, container)
}

const sel = document.getElementById('ex-sel')
const srcEl = document.getElementById('src')
sel.addEventListener('change', () => { srcEl.value = EX[sel.value]||''; runFlux() })

function runFlux() {
  const src = srcEl.value.trim()
  if (!src) return
  const t0 = performance.now()
  const pages = parseFlux(src)
  const t1 = performance.now()
  document.getElementById('s-pages').textContent = pages.length
  document.getElementById('s-state').textContent = pages.reduce((a,p)=>a+Object.keys(p.state).length,0)
  document.getElementById('s-queries').textContent = pages.reduce((a,p)=>a+p.queries.length,0)
  document.getElementById('s-parse').textContent = (t1-t0).toFixed(2)+'ms'

  if (!document.getElementById('flux-css')) {
    const s=document.createElement('style');s.id='flux-css';s.textContent=CSS;document.head.appendChild(s)
  }

  const t2 = performance.now()
  Router.init(pages, document.getElementById('app'))
  document.getElementById('s-render').textContent = (performance.now()-t2).toFixed(2)+'ms'
}

srcEl.value = EX.saas
